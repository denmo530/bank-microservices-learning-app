server:
  port: 8072

spring:
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071/"
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 1000
            response-timeout: 10s
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
  data:
    redis:
      connect-timeout: 2s
      host: localhost
      port: 6379
      timeout: 1s
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

  info:
    env:
      enabled: true


info:
  app:
    name: "gatewayserver"
    description: "Bank gateway-server application"
    version: "1.0.0"
logging:
  level:
    com:
      demor:
        gateway_server: DEBUG
  pattern:
    level: "%5p [${spring.application.name},trace_id=%X{trace_id:-},span_id=%X{span_id:-}]"


resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          nanos: 10000